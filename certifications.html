<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Certifications – Ali Zuhoor</title>

  <!-- Bootstrap & Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Custom Styles -->
  <style>
    body {
      background-color: #f9f9f9;
      font-family: 'Segoe UI', sans-serif;
    }

    .gallery-title {
      text-align: center;
      margin: 40px 0 20px;
    }

    .certificate-img {
      width: 100%;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    .certificate-img:hover {
      transform: scale(1.02);
    }

    .cert-card {
      margin-bottom: 30px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="gallery-title">
      <h2 class="fw-bold text-primary">📜 My Certifications</h2>
      <p class="text-muted">Verified achievements in cybersecurity, web development, AI, automation, and more.</p>
    </div>

    <div class="row">
      <!-- Certificate Card Example -->
      <div class="col-md-4 col-sm-6 cert-card">
        <img src="images/foundation of cyber security.png" alt="foundation of cyber security" class="certificate-img">
      </div>
      <div class="col-md-4 col-sm-6 cert-card">
        <img src="images/manage security risk .png" alt="Manage security risk" class="certificate-img">
      </div>
      <div class="col-md-4 col-sm-6 cert-card">
        <img src="images/connect and protect certification.png" alt="connect and protect certificate" class="certificate-img">
      </div>
      <div class="col-md-4 col-sm-6 cert-card">
        <img src="images/search engine optimization certificate.png" alt="Search Engine optimization" class="certificate-img">
      </div>
      <div class="col-md-4 col-sm-6 cert-card">
        <img src="images/pakistan water challenges.png" alt="Pakistan water challenges" class="certificate-img">
      </div>
      <div class="col-md-4 col-sm-6 cert-card">
        <img src="images/Linux-and-SQL.png" alt="Linux-and-SQL" class="certificate-img">
      </div>
      <div class="col-md-4 col-sm-6 cert-card">
        <img src="images/python_automation_cybersecurity.png" alt="Linux-and-SQL" class="certificate-img">
      </div>
      <div class="col-md-4 col-sm-6 cert-card">
        <img src="images/Detection and Response .png" alt="Linux-and-SQL" class="certificate-img">
      </div>
      <div class="col-md-4 col-sm-6 cert-card">
        <img src="images/prepare for cyber security.png" alt="Linux-and-SQL" class="certificate-img">
      </div>

      <!-- Add more as needed -->
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
